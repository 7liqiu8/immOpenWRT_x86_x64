name: 超简openwrt

on:
#  schedule:
#    - cron: 0 16 * * *
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05
  CONFIG_FILE: immortalwrt/x86_64/超简.config
  DIY_P1_SH: immortalwrt/diy-part1.sh
  DIY_P2_SH: immortalwrt/diy-part2_2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  OPENWRT_NAME: immortalwrt
  OPENWRT_NAME1: x86_64_超简

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 512
        swap-size-mb: 1024
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        
    - name: Check out the project branch
      uses: actions/checkout@main
      with:
          fetch-depth: 0
          
    - name: Clean build caches
      run: |
        echo "Cleaning previous build artifacts and caches..."
        sudo rm -rf $GITHUB_WORKSPACE/openwrt || true
        sudo rm -rf $RUNNER_TEMP/* || true
        sudo rm -rf $RUNNER_TOOL_CACHE/* || true
        sudo apt-get -qq clean || true
        sudo rm -rf /var/lib/apt/lists/* || true
        rm -rf ~/.cache/* || true
        echo "Cache cleanup complete."

    - name: Initialize the compilation environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        ( sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential clang flex g++ gawk gcc-multilib gettext \
        git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev swig libpython3-dev aria2 jq subversion qemu-utils ccache rename libelf-dev
        sudo -E apt-get -qq purge azure-cli ghc* zulu* hhvm llvm* firefox powershell openjdk* dotnet* google* mysql* php* android* rename speedtest-cli
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean ) &
        sudo timedatectl set-timezone "$TZ"
        
    - name: Initialize Environment and Display System Info
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        chmod +x $OPENWRT_NAME/*.sh
        $GITHUB_WORKSPACE/$OPENWRT_NAME/system-Information.sh
        
    - name: Download firmware source code
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt

    - name: Update & install feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
    - name: Load feeds.conf.default
      run: |
        chmod +x $OPENWRT_NAME/*.sh
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Load config
      run: |
        [ -e "$CONFIG_FILE" ] && cat "$CONFIG_FILE" > openwrt/.config
        chmod +x $OPENWRT_NAME/*.sh && cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Download the installation package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
             
    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "date1=$(date +'%Y.%m.%d')" >> $GITHUB_ENV
        echo "date2=$(date "+%Y年%m月%d日%H:%M")" >> $GITHUB_ENV
        echo "date3=$(date +'%H%M')" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Organize and Rename Files
      id: organize
      if: ${{ env.UPLOAD_FIRMWARE == 'true' && steps.compile.outcome == 'success' }}
      run: |
        # 自动识别架构目录，避免硬编码 x86/64
        cd openwrt/bin/targets/*/*
        rm -rf packages *rootfs.tar.gz *rootfs.img.gz *combined.img.gz *.bin *.config *.buildinfo *.json sha256sums *.manifest
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        
    - name: Upload the firmware to github
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        # Artifact 名称也加入时间戳，防止下载错版本
        name: ${{ env.date1 }}_${{ env.OPENWRT_NAME }}_${{ env.OPENWRT_NAME1 }}_${{ env.date3 }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tags
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        # 提取目录名 (例如 x86_64)
        DIR_NAME=$(basename $(dirname $CONFIG_FILE))
        
        # 提取文件名并去掉扩展名 (例如 docker.config -> docker)
        FILE_NAME=$(basename $CONFIG_FILE | cut -d. -f1)
        
        # 组合成最终标识 (例如 x86_64_docker)
        CONFIG_VARIANT="${DIR_NAME}_${FILE_NAME}"
        
        # 生成带分钟的 Tag (例如: 2024.05.20_x86_64_docker_1630)
        RELEASE_TAG="${{ env.date1 }}_${CONFIG_VARIANT}_${{ env.date3 }}"
        echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
        
        touch release.txt
        echo "📥 固件下载" >> release.txt
        echo "- 编译配置: ${CONFIG_VARIANT}" >> release.txt
        echo "- 完整路径: ${CONFIG_FILE}" >> release.txt
        echo "- 编译完成时间: ${{ env.date2 }}" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT
        
    - name: Publish to release
      uses: softprops/action-gh-release@v1
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        # 关键修改：将默认的 GITHUB_TOKEN 替换为自定义的 GH_PAT
        GITHUB_TOKEN: ${{ secrets.GH_PAT }}
      with:
        files: ${{ env.FIRMWARE }}/*
        name: ${{ steps.tag.outputs.release_tag }}
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        # 新增：允许覆盖同名 Tag（避免重复运行时报错）
        overwrite: true
